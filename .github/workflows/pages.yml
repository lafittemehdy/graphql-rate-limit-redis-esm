name: Pages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - examples/visualization/**
      - .github/workflows/pages.yml

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read # Required by configure-pages to resolve the repository's Pages configuration.

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: examples/visualization/package-lock.json

      - name: Install dependencies
        working-directory: examples/visualization
        run: npm ci

      - name: Build
        working-directory: examples/visualization
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: examples/visualization/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    permissions:
      id-token: write # Required for the Pages deployment's OIDC attestation.
      pages: write # Required only to deploy the previously built Pages artifact.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
